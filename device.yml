%YAML 1.1
---
# yaml-language-server: $schema=https://harp-tech.org/draft-02/schema/device.json
device: DelphiController
whoAmI: 1407
firmwareVersion: "0.0.0"
hardwareTargets: "1.0.0"
registers:
    ValveState:
        address: 32
        type: U16
        maskType: ValveMask
        access: Write
        description: "Set the enabled/disabled state (enabled = 1) of all valves"
    ValvesSet:
        address: 33
        type: U16
        maskType: ValveMask
        access: Write
        description: "Write a 1 to any bit to enable the corresponding valve."
    ValvesClear:
        address: 34
        type: U16
        maskType: ValveMask
        access: Write
        description: "Write a 1 to any bit to disable the corresponding valve."
    ValveConfig0: &valveConfig
        address: 35
        type: U8
        length: 12
        access: Write
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve0."
    ValveConfig1:
        <<: *valveConfig
        address: 36
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve1."
    ValveConfig2:
        <<: *valveConfig
        address: 37
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve2."
    ValveConfig3:
        <<: *valveConfig
        address: 38
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve3."
    ValveConfig4:
        <<: *valveConfig
        address: 39
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve4."
    ValveConfig5:
        <<: *valveConfig
        address: 40
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve5."
    ValveConfig6:
        <<: *valveConfig
        address: 41
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve6."
    ValveConfig7:
        <<: *valveConfig
        address: 42
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve7."
    ValveConfig8:
        <<: *valveConfig
        address: 43
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve8."
    ValveConfig9:
        <<: *valveConfig
        address: 44
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve9."
    ValveConfig10:
        <<: *valveConfig
        address: 45
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve10."
    ValveConfig11:
        <<: *valveConfig
        address: 46
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve11."
    ValveConfig12:
        <<: *valveConfig
        address: 47
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve12."
    ValveConfig13:
        <<: *valveConfig
        address: 48
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve13."
    ValveConfig14:
        <<: *valveConfig
        address: 49
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve14."
    ValveConfig15:
        <<: *valveConfig
        address: 50
        description: "the hit duty cycle, hold duty cycle, and hit duration for Valve15."
    AuxGPIODir:
        address: 51
        type: U8
        maskType: AuxGPIOMask
        access: Write
        description: "Specify each auxiliary GPIO pin as an input (0) or output (1)."
    AuxGPIOState:
        address: 52
        type: U8
        maskType: AuxGPIOMask
        access: Write
        description: "Set the state (one or off) of any auxiliary GPIO pins specified as outputs."
    AuxGPIOSet:
        address: 52
        type: U8
        maskType: AuxGPIOMask
        access: Write
        description: "When writing a 1 to any bit, turn on the specified auxiliary GPIO pins specified as outputs."
    AuxGPIOClear:
        address: 53
        type: U8
        maskType: AuxGPIOMask
        access: Write
        description: "When writing a 1 to any bit, Turn off the specified auxiliary GPIO pins specified as outputs."
    AuxGPIOInputRiseEvent:
        address: 54
        type: U8
        maskType: AuxGPIOMask
        access: Event
        description: ""
    AuxGPIOInputFallEvent:
        address: 55
        type: U8
        maskType: AuxGPIOMask
        access: Event
        description: ""
    AuxGPIORisingInputs:
        address: 56
        type: U8
        maskType: AuxGPIOMask
        access: Write
        description: ""
    AuxGPIOFallingInputs:
        address: 57
        type: U8
        maskType: AuxGPIOMask
        access: Write
        description: ""

    PokeDometer:
        address: 58
        type: U32
        access: Read
        description: "number of mouse pokes since boot."
    FSMState:
        address: 0 # FIXME
        type: U32
        access: Write
        description: "enable or disable the poke handling state machine."
    ResetFSM:
        address: 0 # FIXME
        type: U8
        access: Write
        description: "Reset the poke handling state machine."
    ForceFSM:
        address: 0 # FIXME
        type: U8
        access: Write
        description: "Force the poke hanlding state machine to iterate as if handling a mouse poke"
    CurrentOdorIndex:
        address: 0 # FIXME
        type: U8
        access: Write
        description: "The current odor being dispensed to the odor port. Must be specified before enabling the state machine."
    NextOdorIndex:
        address: 0 # FIXME
        type: U8
        access: Write
        description: "The next odor to be dispensed to the odor port after."
    # TODO: poke timing config
    # TODO: poke pin


groupMasks:
    ValveMask:
        description: "Valve that can be configured/enabled/disabled"
        values:
            Valve0: 0x0
            Valve1: 0x1
            Valve2: 0x2
            Valve3: 0x3
            Valve4: 0x4
            Valve5: 0x5
            Valve6: 0x6
            Valve7: 0x7
            Valve8: 0x8
            Valve9: 0x9
            Valve10: 0xA
            Valve11: 0xB
            Valve12: 0xC
            Valve13: 0xD
            Valve14: 0xE
            Valve15: 0xF
    AuxGPIOMask:
        description: "Auxiliary GPIO pin."
        values:
            AuxGPIO0: 0x0
            AuxGPIO1: 0x1
            AuxGPIO2: 0x2
            AuxGPIO3: 0x3
            AuxGPIO4: 0x4
            AuxGPIO5: 0x5
            AuxGPIO6: 0x6
            AuxGPIO7: 0x7
